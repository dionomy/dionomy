services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - dionomy-postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    image: dionomy/backend:${DIONOMY_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DIONOMY_DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DIONOMY_DATABASE_USERNAME: ${POSTGRES_USER}
      DIONOMY_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 12
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    image: dionomy/frontend:${DIONOMY_IMAGE_TAG:-local}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${DIONOMY_HTTP_PORT:-80}:80"

volumes:
  dionomy-postgres-data:
